name: Publish Components and Showcase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-components:
    name: Publish NPM Package (OIDC)
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm (uses packageManager from package.json)
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Check OIDC availability (safe)
        shell: bash
        run: |
          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "OIDC URL PRESENT ✅"
          else
            echo "OIDC URL MISSING ❌"
          fi

          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "OIDC TOKEN PRESENT ✅"
          else
            echo "OIDC TOKEN MISSING ❌"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build components package
        run: pnpm -C packages/seedgrid-fe-components build

      - name: Publish components package (OIDC, clean npmrc)
        shell: bash
        env:
          # força o npm a usar um userconfig limpo (não o /_temp/.npmrc)
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc
        run: |
          # cria um .npmrc limpo (SEM _authToken)
          cat > "$NPM_CONFIG_USERCONFIG" <<'EOF'
          registry=https://registry.npmjs.org/
          always-auth=false
          @seedgrid:registry=https://registry.npmjs.org/
          EOF

          echo "== Using npmrc =="
          cat "$NPM_CONFIG_USERCONFIG"
          echo "== registry =="
          npm config get registry

          cd packages/seedgrid-fe-components

          # publish via OIDC Trusted Publisher
          npm publish --access public --provenance --tag latest --loglevel verbose

  build-and-push-showcase-image:
    name: Build & Push Showcase Docker Image
    runs-on: ubuntu-latest
    needs: publish-components
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seedgrid-showcase
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/showcase/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max