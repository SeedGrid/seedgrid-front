name: Publish Components and Showcase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-components:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Show versions and OIDC availability (safe)
        shell: bash
        run: |
          node -v
          npm -v
          pnpm -v

          echo "== OIDC env presence =="
          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL is PRESENT ✅"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_URL is MISSING ❌"
          fi

          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN is PRESENT ✅"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN is MISSING ❌"
          fi

          echo "== registry =="
          npm config get registry || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build components package
        run: pnpm -C packages/seedgrid-fe-components build

      - name: Resolve npm publish version
        id: npm_version
        shell: bash
        run: |
          PKG_DIR="packages/seedgrid-fe-components"
          PACKAGE_JSON="./packages/seedgrid-fe-components/package.json"

          PACKAGE_NAME=$(node -p "require('${PACKAGE_JSON}').name")
          PACKAGE_VERSION=$(node -p "require('${PACKAGE_JSON}').version")

          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "initial_package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

          while npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; do
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists. Bumping patch..."
            npm --prefix "${PKG_DIR}" version patch --no-git-tag-version
            PACKAGE_VERSION=$(node -p "require('${PACKAGE_JSON}').version")
          done

          echo "resolved_package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}"

      - name: Publish components package to npm (OIDC Trusted Publisher)
        shell: bash
        env:
          # não deixa token clássico interferir
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
        run: |
          # registry canônico
          npm config set registry https://registry.npmjs.org/

          cd packages/seedgrid-fe-components

          # publish canônico com provenance (requerido pro OIDC)
          npm publish --access public --provenance --tag latest

  build-and-push-showcase-image:
    runs-on: ubuntu-latest
    needs: publish-components

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seedgrid-showcase
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/showcase/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max