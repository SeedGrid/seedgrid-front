name: Publish Components and Showcase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-components:
    name: Publish NPM Package (OIDC)
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    outputs:
      calver: ${{ steps.calver.outputs.version }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm (uses packageManager from package.json)
        uses: pnpm/action-setup@v4

      - name: Setup Node (registry)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Force npm v11 (OIDC friendly)
        shell: bash
        run: |
          npm i -g npm@^11
          npm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build components package
        run: pnpm -C packages/seedgrid-fe-components build

      - name: Print workflow ref (must match Trusted Publisher)
        shell: bash
        run: |
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_WORKFLOW_REF=$GITHUB_WORKFLOW_REF"

      - name: Resolve CalVer version (YYYY.MM.DD, then -1, -2...)
        id: calver
        shell: bash
        run: |
          PKG_DIR="packages/seedgrid-fe-components"
          NAME=$(node -p "require('./${PKG_DIR}/package.json').name")

          BASE=$(date +"%Y.%m.%d")
          VERSION="$BASE"
          N=1

          while npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; do
            VERSION="${BASE}-${N}"
            N=$((N + 1))
          done

          echo "Publishing ${NAME}@${VERSION}"
          npm --prefix "${PKG_DIR}" version "${VERSION}" --no-git-tag-version
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish components package (OIDC)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
        run: |
          cd packages/seedgrid-fe-components
          npm config set registry https://registry.npmjs.org/
          npm publish --access public --provenance --tag latest --loglevel verbose

  build-and-push-showcase-image:
    name: Build & Push Showcase Docker Image + Deploy EasyPanel
    runs-on: ubuntu-latest
    needs: publish-components

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (CalVer + latest + sha)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seedgrid-showcase
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.publish-components.outputs.calver }}
            type=sha

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/showcase/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on EasyPanel
        shell: bash
        env:
          EASYPANEL_DEPLOY_URL: ${{ secrets.EASYPANEL_DEPLOY_URL }}
          CALVER: ${{ needs.publish-components.outputs.calver }}
        run: |
          if [[ -z "${EASYPANEL_DEPLOY_URL}" ]]; then
            echo "::error::Missing secret EASYPANEL_DEPLOY_URL"
            exit 1
          fi

          echo "Triggering EasyPanel deploy for version: ${CALVER}"
          # EasyPanel normalmente aceita GET nesse endpoint, mas POST também funciona em alguns setups.
          # Se o seu endpoint for GET, deixe como está.
          curl -fsSL "${EASYPANEL_DEPLOY_URL}"