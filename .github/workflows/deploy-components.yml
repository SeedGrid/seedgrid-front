name: Publish Components and Showcase

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-components:
    name: Publish NPM Package (OIDC)
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    environment: npm
    permissions:
      contents: read
      id-token: write

    outputs:
      calver: ${{ steps.calver.outputs.version }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Force npm v11 (OIDC friendly)
        run: |
          npm i -g npm@^11
          npm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build components package
        run: pnpm -C packages/seedgrid-fe-components build

      - name: Resolve CalVer version
        id: calver
        shell: bash
        run: |
          PKG_DIR="packages/seedgrid-fe-components"
          NAME=$(node -p "require('./${PKG_DIR}/package.json').name")

          YEAR=$(date +%Y)
          MONTH=$((10#$(date +%m)))
          DAY=$((10#$(date +%d)))
          BASE="${YEAR}.${MONTH}.${DAY}"

          VERSION="$BASE"
          N=1

          while npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; do
            VERSION="${BASE}-${N}"
            N=$((N + 1))
          done

          echo "Resolved ${NAME}@${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish components package (OIDC)
        env:
          PUBLISH_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          npm config set registry https://registry.npmjs.org/
          ./publish-components.sh none

  publish-fe-packages:
    name: Publish FE Packages
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Force npm v11 (OIDC friendly)
        run: |
          npm i -g npm@^11
          npm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve shared CalVer version
        id: calver
        shell: bash
        run: |
          YEAR=$(date +%Y)
          MONTH=$((10#$(date +%m)))
          DAY=$((10#$(date +%d)))
          BASE="${YEAR}.${MONTH}.${DAY}"

          echo "base=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Resolve version for fe-core
        id: core_version
        shell: bash
        run: |
          PKG_DIR="packages/seedgrid-fe-core"
          NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
          BASE="${{ steps.calver.outputs.base }}"
          VERSION="$BASE"
          N=1

          while npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; do
            VERSION="${BASE}-${N}"
            N=$((N + 1))
          done

          echo "Resolved ${NAME}@${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build fe-core
        run: pnpm -C packages/seedgrid-fe-core build

      - name: Publish fe-core
        env:
          PUBLISH_VERSION: ${{ steps.core_version.outputs.version }}
        run: |
          npm config set registry https://registry.npmjs.org/
          ./publish-core.sh none

      - name: Resolve version for fe-commons
        id: commons_version
        shell: bash
        run: |
          PKG_DIR="packages/seedgrid-fe-commons"
          NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
          BASE="${{ steps.calver.outputs.base }}"
          VERSION="$BASE"
          N=1

          while npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; do
            VERSION="${BASE}-${N}"
            N=$((N + 1))
          done

          echo "Resolved ${NAME}@${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build fe-commons
        run: pnpm -C packages/seedgrid-fe-commons build

      - name: Publish fe-commons
        env:
          PUBLISH_VERSION: ${{ steps.commons_version.outputs.version }}
        run: |
          npm config set registry https://registry.npmjs.org/
          ./publish-commons.sh none

      - name: Resolve version for fe-theme
        id: theme_version
        shell: bash
        run: |
          PKG_DIR="packages/seedgrid-fe-theme"
          NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
          BASE="${{ steps.calver.outputs.base }}"
          VERSION="$BASE"
          N=1

          while npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; do
            VERSION="${BASE}-${N}"
            N=$((N + 1))
          done

          echo "Resolved ${NAME}@${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build fe-theme
        run: pnpm -C packages/seedgrid-fe-theme build

      - name: Publish fe-theme
        env:
          PUBLISH_VERSION: ${{ steps.theme_version.outputs.version }}
        run: |
          npm config set registry https://registry.npmjs.org/
          ./publish-theme.sh none

      - name: Resolve version for fe-playground
        id: playground_version
        shell: bash
        run: |
          PKG_DIR="packages/seedgrid-fe-playground"
          NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
          BASE="${{ steps.calver.outputs.base }}"
          VERSION="$BASE"
          N=1

          while npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; do
            VERSION="${BASE}-${N}"
            N=$((N + 1))
          done

          echo "Resolved ${NAME}@${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build fe-playground
        run: pnpm -C packages/seedgrid-fe-playground build

      - name: Publish fe-playground
        env:
          PUBLISH_VERSION: ${{ steps.playground_version.outputs.version }}
        run: |
          npm config set registry https://registry.npmjs.org/
          ./publish-playground.sh none

  build-and-deploy-showcase:
    name: Build & Push Showcase Docker Image + Deploy EasyPanel
    runs-on: ubuntu-latest
    needs:
      - publish-components
      - publish-fe-packages
    if: always()

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Define variables by branch
        id: vars
        shell: bash
        run: |
          YEAR=$(date +%Y)
          MONTH=$((10#$(date +%m)))
          DAY=$((10#$(date +%d)))
          BASE="${YEAR}.${MONTH}.${DAY}"

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            VERSION="${{ needs.publish-components.outputs.calver }}"
            DEPLOY_URL="${{ secrets.EASYPANEL_DEPLOY_URL_PRD }}"
            IMAGE="ghcr.io/seedgrid/seedgrid-showcase"
          else
            VERSION="${BASE}-RC-${GITHUB_SHA::7}"
            DEPLOY_URL="${{ secrets.EASYPANEL_DEPLOY_URL_DEV }}"
            IMAGE="ghcr.io/seedgrid/seedgrid-showcase-dev"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vars.outputs.version }}
            type=sha

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/showcase/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on EasyPanel
        shell: bash
        env:
          EASYPANEL_DEPLOY_URL: ${{ steps.vars.outputs.deploy_url }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          if [[ -z "${EASYPANEL_DEPLOY_URL}" ]]; then
            echo "::error::Missing EasyPanel deploy URL"
            exit 1
          fi

          echo "Triggering EasyPanel deploy for version: ${VERSION}"
          curl -fsSL "${EASYPANEL_DEPLOY_URL}"