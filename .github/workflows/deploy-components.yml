name: Publish Components and Showcase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  oidc-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Prove OIDC is available (safe)
        shell: bash
        run: |
          echo "== OIDC env =="
          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "OIDC URL PRESENT ✅"
          else
            echo "OIDC URL MISSING ❌"
          fi

          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "OIDC TOKEN PRESENT ✅"
          else
            echo "OIDC TOKEN MISSING ❌"
          fi

          echo "== versions =="
          node -v || true
          npm -v || true

  publish-components:
    name: Publish NPM Package (OIDC)
    runs-on: ubuntu-latest
    needs: oidc-check
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm (uses packageManager from package.json)
        uses: pnpm/action-setup@v4

      - name: Setup Node (npm registry config)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: "@seedgrid"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build components package
        run: pnpm -C packages/seedgrid-fe-components build

      - name: Debug npm config (safe)
        shell: bash
        run: |
          echo "== npm registry =="
          npm config get registry

          echo "== userconfig path =="
          npm config get userconfig

          echo "== auth token present? (should be empty) =="
          TOK=$(npm config get //registry.npmjs.org/:_authToken || true)
          if [[ "${TOK}" == "undefined" || -z "${TOK}" ]]; then
            echo "No authToken configured ✅"
          else
            echo "authToken IS configured (unexpected) ❌"
          fi

          echo "== npm whoami (expected to fail if no token; OIDC publish still should work) =="
          npm whoami || true

      - name: Remove any residual auth token (safety)
        shell: bash
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          npm config delete //registry.npmjs.org/:always-auth || true

      - name: Publish components package (OIDC)
        shell: bash
        run: |
          cd packages/seedgrid-fe-components
          npm publish --access public --provenance --tag latest --loglevel verbose

  build-and-push-showcase-image:
    name: Build & Push Showcase Docker Image
    runs-on: ubuntu-latest
    needs: publish-components
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seedgrid-showcase
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/showcase/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max