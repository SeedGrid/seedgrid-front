name: Publish Components and Showcase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-components:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Check OIDC availability (safe)
        shell: bash
        run: |
          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "OIDC URL PRESENT ✅"
          else
            echo "OIDC URL MISSING ❌"
          fi

          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "OIDC TOKEN PRESENT ✅"
          else
            echo "OIDC TOKEN MISSING ❌"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build components package
        run: pnpm -C packages/seedgrid-fe-components build

      - name: Publish components package (OIDC)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
        run: |
          cd packages/seedgrid-fe-components
          npm config set registry https://registry.npmjs.org/
          npm publish --access public --provenance --tag latest --loglevel verbose
          