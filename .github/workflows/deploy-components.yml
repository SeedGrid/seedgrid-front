name: Publish Components and Showcase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-components:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Show tool versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build components package
        run: pnpm -C packages/seedgrid-fe-components build

      - name: Resolve npm publish version
        id: npm_version
        shell: bash
        run: |
          PKG_DIR="packages/seedgrid-fe-components"
          PACKAGE_JSON="./packages/seedgrid-fe-components/package.json"

          PACKAGE_NAME=$(node -p "require('${PACKAGE_JSON}').name")
          PACKAGE_VERSION=$(node -p "require('${PACKAGE_JSON}').version")

          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "initial_package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

          while npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; do
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists. Bumping patch..."
            npm --prefix "${PKG_DIR}" version patch --no-git-tag-version
            PACKAGE_VERSION=$(node -p "require('${PACKAGE_JSON}').version")
          done

          echo "resolved_package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}"

      - name: Debug npm auth sources (safe)
        shell: bash
        run: |
          echo "== repo .npmrc =="
          test -f .npmrc && sed -E 's/(_authToken=).+/\1***hidden***/' .npmrc || echo "(none)"

          echo "== package .npmrc =="
          test -f packages/seedgrid-fe-components/.npmrc && sed -E 's/(_authToken=).+/\1***hidden***/' packages/seedgrid-fe-components/.npmrc || echo "(none)"

          echo "== ~/.npmrc =="
          test -f ~/.npmrc && sed -E 's/(_authToken=).+/\1***hidden***/' ~/.npmrc || echo "(none)"

          echo "== env hints =="
          env | grep -E 'NPM|NODE_AUTH_TOKEN' || true

      - name: Publish components package to npm (OIDC Trusted Publisher, NO TOKEN)
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          # Força npm a NÃO ler configs antigas (token fantasma)
          CLEAN_NPMRC="${RUNNER_TEMP}/npmrc-clean"
          cat > "${CLEAN_NPMRC}" <<'EOF'
          registry=https://registry.npmjs.org/
          always-auth=false
          EOF

          export NPM_CONFIG_USERCONFIG="${CLEAN_NPMRC}"

          # GARANTIR que nenhum token esteja setado no ambiente
          unset NODE_AUTH_TOKEN
          unset NPM_TOKEN

          # Publicar a partir do diretório do pacote
          cd packages/seedgrid-fe-components

          echo "Using NPM_CONFIG_USERCONFIG=${NPM_CONFIG_USERCONFIG}"
          npm config get registry

          npm publish --access public --provenance

  build-and-push-showcase-image:
    runs-on: ubuntu-latest
    needs: publish-components

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seedgrid-showcase
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/showcase/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max